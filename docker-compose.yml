services:
  app:
    build: .
    container_name: pbm-app
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
