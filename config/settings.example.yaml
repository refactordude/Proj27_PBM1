# 사내 데이터 플랫폼 설정
# 이 파일을 config/settings.yaml로 복사해서 사용하세요.
# (Settings UI에서 CRUD하면 자동으로 settings.yaml에 저장됩니다.)

databases:
  - name: "Production MySQL (Read-only)"
    type: mysql
    host: localhost
    port: 3306
    database: mydb
    user: readonly_user
    password: "change-me"
    readonly: true

llms:
  - name: "GPT-4o Mini"
    type: openai
    model: gpt-4o-mini
    api_key: ""          # 비워두면 OPENAI_API_KEY 환경변수 사용
    endpoint: ""         # OpenAI 기본 endpoint 사용
    temperature: 0.0
    max_tokens: 2000

  - name: "Local Llama (Ollama)"
    type: ollama
    model: "llama3.1:8b"
    endpoint: "http://localhost:11434"
    api_key: ""
    temperature: 0.0
    max_tokens: 2000

grafana:
  base_url: "http://localhost:3000"
  dashboards:
    - name: "서비스 개요"
      url: "http://localhost:3000/d/abc123/overview?orgId=1"
      kiosk: true

app:
  default_database: "Production MySQL (Read-only)"
  default_llm: "GPT-4o Mini"
  query_row_limit: 1000
  recent_query_history: 20
